<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GEO Monitor</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .hero {
      background: #fff;
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
    }
    h1 {
      font-size: 42px;
      margin: 0 0 12px;
      letter-spacing: -1px;
    }
    .sub {
      color: #64748b;
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .form {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }
    input {
      flex: 1;
      font-size: 16px;
      padding: 15px 16px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      outline: none;
    }
    button {
      padding: 0 22px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }
    .num {
      font-size: 30px;
      font-weight: 800;
      margin-top: 8px;
    }
    .label {
      color: #64748b;
      font-size: 14px;
    }
    .section {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      color: #475569;
      background: #f8fafc;
    }
    .pill {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 5px 9px;
      border-radius: 999px;
      margin: 4px 4px 0 0;
      font-size: 13px;
    }
    .error {
      color: #b91c1c;
      background: #fee2e2;
      padding: 14px;
      border-radius: 12px;
      margin-top: 18px;
    }
    .preview {
      white-space: pre-wrap;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      color: #334155;
      line-height: 1.7;
      max-height: 280px;
      overflow: auto;
    }
    @media (max-width: 800px) {
      .form { flex-direction: column; }
      button { padding: 14px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>GEO Monitor</h1>
      <div class="sub">
        企业官网 AI 引用潜力基础检测工具。输入网址后，自动检测 Title、Meta、H1/H2、JSON-LD、FAQ 和可引用事实，并生成优化建议。
      </div>
      <div class="form">
        <input id="urlInput" value="https://www.szbring.com/" />
        <button id="btn" onclick="analyze()">开始检测</button>
      </div>
      <div id="status"></div>
    </div>

    <div id="result"></div>
  </div>

<script>
async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const result = document.getElementById("result");

  btn.disabled = true;
  btn.innerText = "检测中...";
  status.innerHTML = "";
  result.innerHTML = "";

  try {
    const res = await fetch(`/api/analyze?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || "检测失败");
    }

    render(data);
  } catch (e) {
    status.innerHTML = `<div class="error">检测失败：${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerText = "开始检测";
  }
}

function render(data) {
  const result = document.getElementById("result");

  const detailRows = data.details.map(d => `
    <tr>
      <td>${d.item}</td>
      <td><b>${d.score}</b> / ${d.max}</td>
      <td>${d.note}</td>
    </tr>
  `).join("");

  const h1 = data.h1_list.length ? data.h1_list.map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("") : "未发现";
  const h2 = data.h2_list.length ? data.h2_list.map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("") : "未发现";
  const schemas = data.schema_types.length ? data.schema_types.map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("") : "未发现";

  const suggestions = data.suggestions.map((s, i) => `<li>${escapeHtml(s)}</li>`).join("");

  result.innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">总分</div><div class="num">${data.score}/30</div></div>
      <div class="card"><div class="label">正文字数</div><div class="num">${data.text_len}</div></div>
      <div class="card"><div class="label">H2 数量</div><div class="num">${data.h2_list.length}</div></div>
      <div class="card"><div class="label">可引用事实</div><div class="num">${data.fact_count}</div></div>
    </div>

    <div class="section">
      <h2>分项得分</h2>
      <table>
        <thead><tr><th>检测项</th><th>得分</th><th>说明</th></tr></thead>
        <tbody>${detailRows}</tbody>
      </table>
    </div>

    <div class="section">
      <h2>页面基础信息</h2>
      <table>
        <tr><th>Title</th><td>${escapeHtml(data.title || "未发现")}</td></tr>
        <tr><th>Meta Description</th><td>${escapeHtml(data.meta_desc || "未发现")}</td></tr>
        <tr><th>H1</th><td>${h1}</td></tr>
        <tr><th>H2</th><td>${h2}</td></tr>
        <tr><th>JSON-LD</th><td>${data.jsonld_count} 个，${data.valid_jsonld_count} 个可解析；类型：${schemas}</td></tr>
        <tr><th>FAQ 痕迹</th><td>${data.faq_found ? "有" : "无"}；问号数量：${data.question_mark_count}</td></tr>
      </table>
    </div>

    <div class="section">
      <h2>优先优化建议</h2>
      <ol>${suggestions}</ol>
    </div>

    <div class="section">
      <h2>正文预览</h2>
      <div class="preview">${escapeHtml(data.body_preview || "")}</div>
    </div>
  `;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
